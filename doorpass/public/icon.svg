<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- DoorPass: 공동현관 / 출입 — matches PWA theme_color #22c55e -->
  <rect width="180" height="180" rx="40" fill="#22c55e"/>
  <rect x="0.5" y="0.5" width="179" height="179" rx="39.5" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Door frame -->
  <rect x="44" y="38" width="92" height="118" rx="6" fill="rgba(0,0,0,0.15)"/>
  <rect x="48" y="42" width="84" height="110" rx="4" fill="#f0fdf4"/>
  <!-- Door split (common lobby double door suggestion) -->
  <line x1="90" y1="46" x2="90" y2="148" stroke="#bbf7d0" stroke-width="2" stroke-linecap="round"/>
  <!-- Keypad / pass dots -->
  <circle cx="72" cy="118" r="5" fill="#15803d"/>
  <circle cx="90" cy="118" r="5" fill="#15803d"/>
  <circle cx="108" cy="118" r="5" fill="#15803d"/>
  <circle cx="81" cy="132" r="5" fill="#15803d"/>
  <circle cx="99" cy="132" r="5" fill="#15803d"/>
  <!-- Handle -->
  <rect x="118" y="88" width="8" height="4" rx="2" fill="#15803d"/>
</svg>
